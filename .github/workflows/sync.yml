name: Sync and Deploy Docs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests markdownify mkdocs-material mkdocs-minify-plugin

      - name: Run Sync Script
        env:
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: python sync_docs.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "DocSyncBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Automated doc update: $(date)" || exit 0
          git push origin main --force

      - name: Build and Deploy Site
        run: |
          mkdocs build
          mkdocs gh-deploy --force
